name: SNS Daily Auto Post

on:
  schedule:
    - cron: '0 11 * * *'  # UTC 11:00 = JST 20:00
  workflow_dispatch: {}

env:
  SHOPIFY_API_VERSION: '2026-04'

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Setup credentials
        env:
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          IG_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          IG_PAGE_TOKEN: ${{ secrets.INSTAGRAM_PAGE_TOKEN }}
          IG_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
        run: python -c "import json,os;json.dump({'access_token':os.environ['SHOPIFY_TOKEN']},open('.shopify_token.json','w'));json.dump({'access_token':os.environ['IG_ACCESS_TOKEN'],'page_access_token':os.environ['IG_PAGE_TOKEN'],'ig_user_id':os.environ['IG_USER_ID'],'page_id':'979402688599458','page_name':'HD Toys Store Japan','token_type':'long_lived'},open('.instagram_token.json','w'));print('OK: IG user',os.environ['IG_USER_ID'])"

      - name: Run Instagram auto post
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
        run: python store/scripts/instagram_auto_post.py

      - name: Commit posted list
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f ops/monitoring/sns_posted.json || true
          git diff --cached --quiet || git commit -m "Update SNS posted list [auto]"
          git push || true

      - name: Cleanup credentials
        if: always()
        run: rm -f .shopify_token.json .instagram_token.json
