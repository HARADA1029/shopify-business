name: SNS Daily Auto Post

on:
  schedule:
    - cron: '0 11 * * *'  # UTC 11:00 = JST 20:00
  workflow_dispatch: {}     # 手動実行も可能

env:
  SHOPIFY_API_VERSION: '2026-04'

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Setup credentials
        env:
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          IG_TOKEN: ${{ secrets.INSTAGRAM_TOKEN_JSON }}
        run: |
          echo "{\"access_token\": \"$SHOPIFY_TOKEN\"}" > .shopify_token.json
          echo "$IG_TOKEN" > .instagram_token.json

      - name: Run Instagram auto post
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
        run: python store/scripts/instagram_auto_post.py

      - name: Commit posted list
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ops/monitoring/sns_posted.json
          git diff --cached --quiet || git commit -m "Update SNS posted list [auto]"
          git push

      - name: Cleanup credentials
        if: always()
        run: rm -f .shopify_token.json .instagram_token.json
