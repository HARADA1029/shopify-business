name: SNS Daily Video Post

on:
  schedule:
    - cron: '0 17 * * *'  # UTC 17:00 = JST 02:00 (画像投稿の6時間後)
  workflow_dispatch: {}

env:
  SHOPIFY_API_VERSION: '2026-04'

jobs:
  video-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Setup credentials
        run: |
          python store/scripts/setup_ci_credentials.py
        env:
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          IG_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          IG_PAGE_TOKEN: ${{ secrets.INSTAGRAM_PAGE_TOKEN }}
          IG_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}

      - name: Run video auto post
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: python store/scripts/video_auto_post.py

      - name: Commit posted list
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f ops/monitoring/sns_posted.json || true
          git diff --cached --quiet || git commit -m "Update SNS posted list (video) [auto]"
          git push || true

      - name: Cleanup credentials
        if: always()
        run: rm -f .shopify_token.json .instagram_token.json
