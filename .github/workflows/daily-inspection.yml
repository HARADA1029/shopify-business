name: Daily Store Inspection

on:
  schedule:
    - cron: '0 18 * * *'  # UTC 18:00 = JST 03:00
  workflow_dispatch: {}     # 手動実行も可能

env:
  SHOPIFY_API_VERSION: '2026-04'

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dotenv google-analytics-data google-api-python-client google-auth

      - name: Setup GCP credentials
        env:
          GCP_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          if [ -n "$GCP_KEY" ]; then
            echo "$GCP_KEY" > .gcp_service_account.json
          fi

      - name: Run daily inspection
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_ROOM_ID }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GCP_KEY_FILE: .gcp_service_account.json
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
          EBAY_REFRESH_TOKEN: ${{ secrets.EBAY_REFRESH_TOKEN }}
        run: |
          python -c "import json,os;t=os.environ.get('EBAY_REFRESH_TOKEN','');json.dump({'access_token':'','refresh_token':t},open('.ebay_token.json','w')) if t else None"
          python ops/monitoring/daily_inspection.py

      - name: Cleanup credentials
        if: always()
        run: rm -f .gcp_service_account.json .ebay_token.json

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_number }}
          path: ops/monitoring/reports/
          retention-days: 90
