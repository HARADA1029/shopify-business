name: Daily Store Inspection

on:
  schedule:
    - cron: '0 18 * * *'  # UTC 18:00 = JST 03:00
  workflow_dispatch: {}     # 手動実行も可能

env:
  SHOPIFY_API_VERSION: '2026-04'

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dotenv google-analytics-data google-api-python-client google-auth

      - name: Setup GCP credentials
        env:
          GCP_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          if [ -n "$GCP_KEY" ]; then
            echo "$GCP_KEY" > .gcp_service_account.json
          fi

      - name: Setup API tokens
        env:
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          EBAY_REFRESH_TOKEN: ${{ secrets.EBAY_REFRESH_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_PAGE_TOKEN: ${{ secrets.INSTAGRAM_PAGE_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
        run: |
          python -c "import json,os;t=os.environ.get('SHOPIFY_ACCESS_TOKEN','');json.dump({'access_token':t,'scope':''},open('.shopify_token.json','w')) if t else None"
          python -c "import json,os;t=os.environ.get('EBAY_REFRESH_TOKEN','');json.dump({'access_token':'','refresh_token':t},open('.ebay_token.json','w')) if t else None"
          python -c "import json,os;t=os.environ.get('INSTAGRAM_ACCESS_TOKEN','');u=os.environ.get('INSTAGRAM_USER_ID','');json.dump({'access_token':t,'page_access_token':os.environ.get('INSTAGRAM_PAGE_TOKEN',''),'ig_user_id':u,'page_id':''},open('.instagram_token.json','w')) if t else None"

      - name: Run daily inspection
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_ROOM_ID }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GCP_KEY_FILE: .gcp_service_account.json
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
          EBAY_REFRESH_TOKEN: ${{ secrets.EBAY_REFRESH_TOKEN }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
          PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
        run: python ops/monitoring/daily_inspection.py

      - name: Commit updated state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f \
            ops/monitoring/shared_state.json \
            ops/monitoring/proposal_tracking.json \
            ops/monitoring/experiment_log.json \
            ops/monitoring/research_log.json \
            ops/monitoring/price_sync_log.json \
            ops/monitoring/blog_state.json \
            ops/monitoring/sns_posted.json \
            ops/monitoring/adoption_tracking.json \
            ops/monitoring/bug_audit_log.json \
            ops/monitoring/safety_audit_log.json \
            ops/monitoring/maintenance_log.json \
            ops/monitoring/design_audit_log.json \
            ops/monitoring/newsletter_state.json \
            ops/monitoring/image_sync_log.json \
            ops/monitoring/sns_weights.json \
            ops/monitoring/sns_learning.json \
            ops/monitoring/infra_tasks.json \
            ops/monitoring/proposal_filter_state.json \
            ops/monitoring/product_comparison_cache.json \
            ops/monitoring/ebay_sales_cache.json \
            ops/monitoring/competitive_cache.json \
            ops/monitoring/reports/ \
            2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update daily inspection state files [auto]"
          git push || true

      - name: Cleanup credentials
        if: always()
        run: rm -f .gcp_service_account.json .ebay_token.json .shopify_token.json .instagram_token.json
