name: Blog Auto Post

on:
  schedule:
    - cron: '0 15 * * *'  # UTC 15:00 = JST 00:00 毎日深夜
  workflow_dispatch: {}

jobs:
  blog-post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Setup credentials
        run: |
          python store/scripts/setup_ci_credentials.py
        env:
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          IG_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          IG_PAGE_TOKEN: ${{ secrets.INSTAGRAM_PAGE_TOKEN }}
          IG_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}

      - name: Run blog auto post
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: python store/scripts/blog_auto_post.py

      - name: Commit blog state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f ops/monitoring/blog_state.json || true
          git diff --cached --quiet || git commit -m "Update blog state [auto]"
          git push || true
